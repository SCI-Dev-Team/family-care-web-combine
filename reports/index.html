<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — Family Care First</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    .site-nav { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; padding: 12px 16px; }
    .site-nav a { color: #fff; text-decoration: none; font-size: 14px; font-weight: 600; }
    .site-nav a:hover { text-decoration: underline; }
    .site-nav a.current { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="m-wrapper">
    <header class="intro-area background-header">
      <div class="header-overlay">
        <nav class="site-nav">
          <a href="../">Home</a>
          <a href="../posts/">Posts</a>
          <a href="../stories/">Stories</a>
          <a href="../reports/" class="current">Reports</a>
        </nav>
        <div class="container big-slider">
          <div class="big-slider-content">
            <h1>Reports &amp; Research Documents</h1>
            <p>Archive rendered from extracted JSON</p>
          </div>
          <div class="curse-bg"></div>
        </div>
      </div>
    </header>
  </div>

  <main class="about-page-area area-padding library-page-area">
    <div class="container containing">
      <div class="resources-wrapper">
        <div class="custom-filters">
          <div class="form-field__search">
            <input
              type="search"
              class="form-control input-sm"
              placeholder="Search..."
              id="reportSearch"
              autocomplete="off">
            <button type="button" aria-label="Search"><span class="icon-search">⌕</span></button>
          </div>
          <div class="member-category">
            <button class="filter-btn active" data-category="all">All Categories</button>
          </div>
        </div>

        <div class="post-result row">
          <div class="col-result">
            <span id="resultText">Loading reports...</span>
          </div>
          <div class="col-sort">
            <label class="sorting">
              Sort by
              <select id="sortSelect" class="form-control input-sm" aria-label="Sort order">
                <option value="desc">Newest</option>
                <option value="asc">Oldest</option>
              </select>
            </label>
          </div>
        </div>

        <div class="download-content">
          <table id="report-table" class="table table-sm document-order" cellspacing="0" width="100%">
            <thead>
              <tr>
                <th class="th-date">Date</th>
                <th class="th-title">Resource Title</th>
                <th class="th-actions">View / Download</th>
              </tr>
            </thead>
            <tbody id="reportTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- In-page report viewer modal -->
  <div id="reportViewerModal" class="report-viewer-modal" aria-hidden="true" role="dialog" aria-labelledby="reportViewerTitle">
    <div class="report-viewer-backdrop"></div>
    <div class="report-viewer-panel">
      <div class="report-viewer-header">
        <h2 id="reportViewerTitle" class="report-viewer-title"></h2>
        <div class="report-viewer-actions">
          <a id="reportViewerDownload" class="btn-download" href="#" download target="_blank" rel="noopener">Download</a>
          <button type="button" class="report-viewer-close" aria-label="Close viewer">&times;</button>
        </div>
      </div>
      <div class="report-viewer-body">
        <div id="reportViewerLoading" class="report-viewer-loading" aria-live="polite">Loading…</div>
        <iframe id="reportViewerFrame" title="Report document" src="about:blank"></iframe>
        <div id="reportViewerRendered" class="report-viewer-rendered"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx-preview@0.3.0/dist/docx-preview.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
